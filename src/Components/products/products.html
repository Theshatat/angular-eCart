
<div class="container">
    <h1>Selected Category Id : {{selectedCatId}}</h1>
    <div class="mb-3">
        <label for="" class="form-label">Selected Category</label>
        <select name="" id=""  [(ngModel)]="selectedCatId" class="form-select">
            <option *ngFor="let cat of categories" [value]="cat.id">{{cat.name}}</option>
        </select>
    </div>
    <div class="row" style="border: 1px solid black;" appRoundedShadow="green">
        <ng-container  *ngFor="let product of myProducts">
            <!-- <div class="col-md-4"*ngIf="product.quantity!=0" [style.background-color]="product.quantity==1 ?'red':'white'"> -->
        <div class="col-md-4">
            <div class="card mt-3" style="width: 18rem;">
                <img class="card-img-top" [src]="product.imageUrl" alt="Card image cap" height="300px">
                <div class="card-body">
                    <h5 class="card-title">{{product.name}}</h5>
                    <p class="card-text">price: {{product.price}}</p>
                    <p class="card-text">quantity: {{product.quantity}}</p>
                    <input type="number" class="form-control mb-2" placeholder="Enter A Valid Quantity" #count>
                    <!-- <a href="#" class="btn btn-primary" (click)="buy(count.value,product.price)">Add To Cart</a> -->
                    <button class="btn btn-primary" (click)="buy(product)">Add To Cart</button>    
                </div>
            </div>
        </div>
        </ng-container>
    </div>
</div>

<div class="mb-3">
    <h3>{{nationalId | nationalIdTransform:"DD"}}</h3>
</div>
<div>
    <h3>{{CreditCard | creditCardTransform}}</h3>
</div>
